name: Build CV

on: [push]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install
      - run: node generate-pdf.js

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cv.pdf
          git commit -m "Update CV PDF" || echo "No changes"
          git push